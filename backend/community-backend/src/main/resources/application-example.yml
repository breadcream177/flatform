spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/community?useUnicode=true&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
            scope:
              - email
              - profile

          kakao:
            client-id: ${KAKAO_CLIENT_ID:change-me}
            client-secret: ${KAKAO_CLIENT_SECRET:change-me}
            redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/login/oauth2/code/kakao}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
            client-name: Kakao

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: ${SERVER_PORT:8080}

app:
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

naver:
  search:
    client-id: ${NAVER_SEARCH_CLIENT_ID:change-me}
    client-secret: ${NAVER_SEARCH_CLIENT_SECRET:change-me}

gemini:
  api-key: ${GEMINI_API_KEY:change-me}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
